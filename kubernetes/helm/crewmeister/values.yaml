app:
  image: ghcr.io/kamran-saeed/crewmeister-challenge
  tag: latest
  replicas: 1
  port: 8080
  pullPolicy: Always
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  probes:
    liveness:
      path: /actuator/health/liveness
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 5
    readiness:
      path: /actuator/health/readiness
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5

mysql:
  image: mysql
  tag: "8.0"
  port: 3306
  database: challenge
  username: root
  password: ""
  storage: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50

externalSecrets:
  enabled: false
  secretName: ""

ingress:
  enabled: false
  className: nginx
  host: ""

serviceMonitor:
  enabled: false
