apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mysql-headless
  labels:
    {{- include "crewmeister.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "crewmeister.mysqlSelectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.mysql.port }}
      targetPort: {{ .Values.mysql.port }}
