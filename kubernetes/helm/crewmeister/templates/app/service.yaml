apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-app-service
  labels:
    {{- include "crewmeister.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "crewmeister.appSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.app.port }}
      targetPort: {{ .Values.app.port }}
  type: ClusterIP
