{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ .Release.Name }}-secret-store
  labels:
    {{- include "crewmeister.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-central-1
{{- end }}
