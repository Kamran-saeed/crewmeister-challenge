apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    {{- include "crewmeister.labels" . | nindent 4 }}
data:
  SPRING_DATASOURCE_URL: "jdbc:mysql://{{ .Release.Name }}-mysql-0.{{ .Release.Name }}-mysql-headless:{{ .Values.mysql.port }}/{{ .Values.mysql.database }}?createDatabaseIfNotExist=true"
  SPRING_DATASOURCE_WRITER_URL: "jdbc:mysql://{{ .Release.Name }}-mysql-0.{{ .Release.Name }}-mysql-headless:{{ .Values.mysql.port }}/{{ .Values.mysql.database }}?createDatabaseIfNotExist=true"
  SPRING_DATASOURCE_USERNAME: {{ .Values.mysql.username | quote }}
